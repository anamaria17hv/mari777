<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú del Día</title>
</head>
<body>

<h1>Menú del Día</h1>

<!-- Navegación -->
<button onclick="mostrar('busqueda')">Buscar</button>
<button onclick="mostrar('resultados')">Restaurantes</button>
<button onclick="mostrar('registro')">Registrar</button>

<!-- Búsqueda -->
<div id="busqueda">
  <h2>Buscar</h2>
  <input type="text" placeholder="Ubicación"><br><br>

  <select>
    <option>Todos</option>
    <option>Comida casera</option>
    <option>Vegetariana</option>
  </select><br><br>

  <button onclick="mostrar('resultados')">Buscar</button>
</div>

<!-- Resultados -->
<div id="resultados" style="display:none;">
  <h2>Restaurantes</h2>

  <p><strong>La Casita</strong><br>
  Menú: Arroz con pollo<br>
  Precio: $12.000</p>

  <button onclick="mostrar('perfil')">Ver menú</button>
</div>

<!-- Registro -->
<div id="registro" style="display:none;">
  <h2>Registrar Restaurante</h2>

  <input type="text" placeholder="Nombre"><br><br>
  <input type="text" placeholder="Dirección"><br><br>
  <input type="text" placeholder="Precio"><br><br>

  <button onclick="mostrar('resultados')">Guardar</button>
</div>

<!-- Perfil -->
<div id="perfil" style="display:none;">
  <h2>La Casita</h2>
  <p>Arroz con pollo - $12.000</p>

  <button onclick="mostrar('resultados')">Volver</button>
</div>

<script>
function mostrar(vista) {
  document.getElementById("busqueda").style.display = "none";
  document.getElementById("resultados").style.display = "none";
  document.getElementById("registro").style.display = "none";
  document.getElementById("perfil").style.display = "none";

  document.getElementById(vista).style.display = "block";
}
</script>

</body>
</html>
